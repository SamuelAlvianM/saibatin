# Nginx reverse proxy → Next.js (PM2) di 127.0.0.1:3000.
# PENTING (server ini SHARED dgn app lain "dukcapil"/KTT):
#  - server_name SPESIFIK ke host nip.io saja. TANPA `default_server` & TANPA `_`
#    agar TIDAK membajak trafik app lain (IP mentah tetap milik dukcapil).
# Pasang: salin ke /etc/nginx/sites-available/saibatin, symlink ke sites-enabled,
# `nginx -t && systemctl reload nginx`. (server-bootstrap.sh melakukan ini.)
server {
    listen 80;
    listen [::]:80;

    # Host khusus saibatin (subdomain gratis via nip.io → resolve ke 76.13.19.247).
    server_name saibatin.76.13.19.247.nip.io;

    client_max_body_size 12M; # unggah KTP/KK & Excel demografi

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }
}
